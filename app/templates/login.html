{% extends 'base.html' %}
{% block content %}
<div style="min-height:100vh; background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)), url('https://assets.nflxext.com/ffe/siteui/vlv3/9fbb5827-87b3-4d37-95f4-ee3d4e5a28de/web/IN-en-20250120-TRIFECTA-perspective_24e34af1-3c83-4e3d-b8d5-06f90bc6e41e_large.jpg') center/cover; display:flex; align-items:center; justify-content:center; margin-top:-70px; padding-top:70px;">
    <div style="background:rgba(0,0,0,0.75); padding:60px 68px; border-radius:4px; width:100%; max-width:450px;">
        <h2 style="font-size:2rem; font-weight:700; margin-bottom:28px;">Sign In</h2>
        <form method="POST">
            <div class="mb-4">
                <input type="email" name="email" class="form-control form-control-lg" placeholder="Email or phone number" required style="background:#333; border:none; color:white; padding:16px; border-radius:4px;">
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required style="background:#333; border:none; color:white; padding:16px; border-radius:4px;">
            </div>
            <button type="submit" class="btn w-100 btn-lg mb-4" style="background:#e50914; color:white; font-size:1rem; font-weight:600; padding:16px; border-radius:4px;">Sign In</button>
        </form>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" style="background:#333;">
                <label class="form-check-label text-muted" for="remember" style="font-size:0.85rem;">Remember me</label>
            </div>
            <a href="#" style="color:#b3b3b3; font-size:0.85rem; text-decoration:none;">Need help?</a>
        </div>
        <p style="color:#737373; font-size:1rem;">New to Netflix? <a href="/register" style="color:white; text-decoration:none; font-weight:600;">Sign up now</a></p>
        <p style="color:#8c8c8c; font-size:0.8rem; margin-top:15px;">This page is protected by Google reCAPTCHA to ensure you're not a bot.</p>

        <!-- Quick Login Box -->
        <div style="background:rgba(255,255,255,0.05); border:1px solid #444; border-radius:4px; padding:15px; margin-top:20px;">
            <p style="font-size:0.8rem; color:#b3b3b3; margin-bottom:10px;">⚡ Quick Login (Demo)</p>
            <div class="d-flex gap-2">
                <a href="/switch/admin" style="flex:1; background:#e50914; color:white; text-align:center; padding:8px; border-radius:4px; text-decoration:none; font-size:0.8rem; font-weight:600;">Login as Admin</a>
                <a href="/switch/user" style="flex:1; background:#333; color:white; text-align:center; padding:8px; border-radius:4px; text-decoration:none; font-size:0.8rem; font-weight:600;">Login as User</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
