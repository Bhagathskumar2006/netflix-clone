{% extends 'base.html' %}
{% block content %}
<div style="padding:40px; background:#141414; min-height:100vh;">
    <div style="max-width:600px; margin:0 auto;">
        <div style="margin-bottom:30px;">
            <a href="/admin" style="color:#b3b3b3; text-decoration:none; font-size:0.9rem;"><i class="fas fa-arrow-left me-2"></i>Back to Admin</a>
            <h2 style="font-size:1.8rem; font-weight:900; margin-top:15px;">Edit Content</h2>
        </div>
        <div style="background:#1f1f1f; border-radius:8px; padding:35px;">
            <form method="POST">
                <div class="mb-4">
                    <label style="color:#b3b3b3; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:block;">Title</label>
                    <input type="text" name="title" value="{{ movie.title }}" class="form-control" required style="background:#333; border:none; color:white; padding:14px; border-radius:4px;">
                </div>
                <div class="mb-4">
                    <label style="color:#b3b3b3; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:block;">Description</label>
                    <textarea name="description" class="form-control" rows="3" required style="background:#333; border:none; color:white; padding:14px; border-radius:4px; resize:none;">{{ movie.description }}</textarea>
                </div>
                <div class="mb-4">
                    <label style="color:#b3b3b3; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:block;">Genre</label>
                    <select name="genre" class="form-control" style="background:#333; border:none; color:white; padding:14px; border-radius:4px;">
                        {% for g in ['Action', 'Comedy', 'Drama', 'Horror', 'Sci-Fi', 'Romance', 'Thriller', 'Animation', 'Documentary', 'Fantasy'] %}
                        <option value="{{ g }}" {% if movie.genre == g %}selected{% endif %}>{{ g }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-4">
                    <label style="color:#b3b3b3; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:block;">YouTube Embed URL</label>
                    <input type="text" name="youtube_url" value="{{ movie.youtube_url }}" class="form-control" required style="background:#333; border:none; color:white; padding:14px; border-radius:4px;">
                </div>
                <div class="mb-4">
                    <label style="color:#b3b3b3; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:block;">Thumbnail URL</label>
                    <input type="text" name="thumbnail" value="{{ movie.thumbnail }}" class="form-control" required style="background:#333; border:none; color:white; padding:14px; border-radius:4px;">
                    <div style="margin-top:10px;">
                        <img src="{{ movie.thumbnail }}" style="height:80px; border-radius:4px;" onerror="this.style.display='none'">
                    </div>
                </div>
                <button type="submit" class="btn w-100 btn-lg mt-2" style="background:#e50914; color:white; font-weight:700; padding:15px; border-radius:4px;">
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
